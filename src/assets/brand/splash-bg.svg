<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Libris splash background">
  <defs>
    <linearGradient id="splash-grad" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(135, 0.5, 0.5)">
      <stop offset="0%" stop-color="#3F1C66"/>
      <stop offset="100%" stop-color="#B12166"/>
